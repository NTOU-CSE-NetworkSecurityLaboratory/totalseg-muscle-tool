<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PyWebView Minimal Demo</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <h1>PyWebView Minimal Demo</h1>
    <p class="desc">純 Python + WebView，未連接原本專案。</p>

    <section class="card">
      <h2>1) Ping Python</h2>
      <button id="btn-ping">Ping</button>
    </section>

    <section class="card">
      <h2>2) Echo</h2>
      <div class="row">
        <input id="echo-input" placeholder="輸入任意文字" />
        <button id="btn-echo">Echo</button>
      </div>
    </section>

    <section class="card">
      <h2>3) Fake Job</h2>
      <div class="row">
        <input id="job-seconds" type="number" min="0" max="10" value="2" />
        <button id="btn-job">Run</button>
      </div>
      <p class="hint">模擬長任務，觀察前後端互動。</p>
    </section>

    <section class="card">
      <h2>Output</h2>
      <pre id="output"></pre>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
